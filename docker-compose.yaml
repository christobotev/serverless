version: "3.2"

networks:
  middleware:
    external:
      name: middleware_default

services:
  node:
    build:
      context: .
      dockerfile: ./docker/node/Dockerfile
    depends_on:
      - python
    environment:
      PATH: "/application/node_modules/.bin:$PATH"
      DYNAMO_ENDPOINT: http://dynamo:8000
    env_file:
      - .env
    volumes:
      - type: bind
        source: .
        target: /application
    working_dir: /application
    ports:
      - "7001:8001"

  python:
    build:
      context: .
      dockerfile: ./docker/python/Dockerfile
    networks:
      - middleware # in order to connect to bridge
    depends_on:
      - dynamo
      - s3
    env_file:
      - .env
    volumes:
      - type: bind
        source: .
        target: /application

  dynamo:
    image: amazon/dynamodb-local:1.11.477
    networks:
      - middleware
    ports:
      - "6000:8000"

  s3:
    image: minio/minio:RELEASE.2019-06-15T23-07-18Z
    networks:
      - middleware
    ports:
      - "6002:9000"
    volumes:
      - ./var/s3-dev:/data
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    command: server /data
